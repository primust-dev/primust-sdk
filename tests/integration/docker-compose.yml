services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: primust
      POSTGRES_PASSWORD: primust_test
      POSTGRES_DB: primust_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primust -d primust_test"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ../../packages/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/01_initial.sql:ro
      - ../../packages/db/migrations/002_api_keys.sql:/docker-entrypoint-initdb.d/02_api_keys.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
