[project]
name = "primust-zk-worker"
version = "0.0.1"
description = "Modal serverless ZK proof worker for Primust circuits"
requires-python = ">=3.11"
license = {text = "UNLICENSED"}
dependencies = [
    "modal>=0.73.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/primust_zk_worker"]
