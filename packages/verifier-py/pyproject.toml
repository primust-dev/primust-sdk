[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "primust-verify"
version = "0.0.1"
description = "Offline verifier (pip install primust-verify)"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "primust-artifact-core",
    "PyNaCl>=1.5.0",
]

[project.scripts]
primust-verify = "primust_verify.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/primust_verify"]

[tool.pytest.ini_options]
testpaths = ["tests"]
