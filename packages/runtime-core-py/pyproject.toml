[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "primust-runtime-core"
version = "0.0.1"
description = "Local store equivalent (Python)"
requires-python = ">=3.11"
license = "LicenseRef-Proprietary"
dependencies = [
    "primust-artifact-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/primust_runtime_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
