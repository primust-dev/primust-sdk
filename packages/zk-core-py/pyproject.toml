[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "primust-zk-core"
version = "0.0.1"
description = "Poseidon2 commitments (Python)"
requires-python = ">=3.11"
license = "LicenseRef-Proprietary"

[tool.hatch.build.targets.wheel]
packages = ["src/primust_zk_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
