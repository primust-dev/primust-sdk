[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "primust-otel"
version = "0.0.1"
description = "Primust governance adapter for OpenTelemetry"
requires-python = ">=3.11"
license = "LicenseRef-Proprietary"
dependencies = [
  "primust",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/primust_otel"]

[tool.pytest.ini_options]
testpaths = ["tests"]
