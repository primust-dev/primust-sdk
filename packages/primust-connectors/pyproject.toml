[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "primust-connectors"
version = "0.1.0"
description = "Primust regulated industry connectors — AML, credit, clinical, insurance"
requires-python = ">=3.11"
license = "LicenseRef-Proprietary"
dependencies = [
  "primust",
  "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/primust_connectors"]

[tool.pytest.ini_options]
testpaths = ["tests"]
